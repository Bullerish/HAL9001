name: Secret scan

# Defense-in-depth for a PUBLIC repo: catch any committed credential before (and after) it lands.
# Runs gitleaks over the full history on every push/PR. This complements GitHub's native secret
# scanning + push protection (enable those in Settings → Code security) — gitleaks also scans
# history and custom patterns, and lives in-repo so the protection travels with the code.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, so a secret in any past commit is caught
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action is free for public repos; no GITLEAKS_LICENSE needed.
